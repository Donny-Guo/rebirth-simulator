<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>重生之我在xxx当xxx</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --paper: #f4e4c1;
  --paper-dark: #e8d4a8;
  --ink: #1a1a1a;
  --vermilion: #c1272d;
  --gold: #d4a017;
  --indigo: #2e5266;
  --shadow: rgba(26, 26, 26, 0.15);
}
html, body { height: 100%; }
body {
  font-family: 'ZCOOL KuaiLe', 'STKaiti', 'KaiTi', serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.7;
  overflow-x: hidden;
}
#app { min-height: 100vh; position: relative; }

.paper-bg {
  background:
    radial-gradient(circle at 20% 30%, rgba(193, 39, 45, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(46, 82, 102, 0.05) 0%, transparent 50%),
    var(--paper);
  position: relative;
  min-height: 100vh;
}
.paper-bg::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(26,26,26,0.02) 2px, rgba(26,26,26,0.02) 3px),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(26,26,26,0.02) 2px, rgba(26,26,26,0.02) 3px);
  pointer-events: none;
  z-index: 1;
}

.ink-border {
  border: 3px solid var(--ink);
  border-radius: 4px 18px 6px 22px / 18px 4px 22px 6px;
  position: relative;
  background: var(--paper);
  box-shadow: 4px 4px 0 var(--shadow);
}
.ink-border-thin {
  border: 2px solid var(--ink);
  border-radius: 3px 12px 5px 15px / 12px 3px 15px 5px;
  background: var(--paper);
}

.title { font-family: 'Ma Shan Zheng', cursive; font-size: 2.5rem; color: var(--ink); }
.subtitle { font-family: 'ZCOOL XiaoWei', serif; font-size: 1.1rem; color: var(--ink); }
.body-text { font-size: 1.15rem; line-height: 1.9; white-space: pre-wrap; }
.system-text { font-family: 'ZCOOL XiaoWei', serif; color: var(--gold); font-size: 1.1rem; }
.emphasis { color: var(--vermilion); font-weight: bold; }
.dim { color: rgba(26, 26, 26, 0.6); font-size: 0.9rem; }

.btn {
  font-family: inherit;
  font-size: 1.1rem;
  padding: 12px 24px;
  background: var(--paper);
  color: var(--ink);
  border: 3px solid var(--ink);
  border-radius: 6px 16px 4px 18px / 16px 6px 18px 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 3px 3px 0 var(--shadow);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: var(--vermilion); color: var(--paper); transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--shadow); }
.btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--shadow); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn:disabled:hover { background: var(--paper); color: var(--ink); transform: none; box-shadow: 3px 3px 0 var(--shadow); }
.btn-block { display: block; width: 100%; margin-bottom: 12px; text-align: left; padding: 16px 20px; }
.btn-block:last-child { margin-bottom: 0; }

.container { max-width: 720px; margin: 0 auto; padding: 20px; position: relative; z-index: 2; }
.center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.fade-in { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.shake { animation: shake 0.4s ease; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.scenario-card {
  padding: 16px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.scenario-card:hover { background: var(--paper-dark) !important; transform: translateX(4px); }

.stat-bar-bg {
  flex: 1;
  margin-left: 10px;
  height: 10px;
  background: var(--paper-dark);
  border: 1px solid var(--ink);
  border-radius: 2px;
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  transition: width 0.5s ease;
}

#toast-layer {
  position: fixed;
  top: 80px;
  right: 20px;
  z-index: 50;
  pointer-events: none;
  max-width: 320px;
}
#flying-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 60;
  overflow: hidden;
}

.scene-bubble-default {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 12px 12px 12px 4px;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.scene-bubble-me {
  background: rgba(46, 82, 102, 0.1);
  border-left: 4px solid var(--indigo);
  padding: 14px 16px;
  margin-bottom: 12px;
  font-style: italic;
}
.scene-bubble-system {
  background: rgba(212, 160, 23, 0.15);
  border: 2px dashed var(--gold);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
}

.skill-chip {
  background: var(--gold);
  color: var(--ink);
  padding: 2px 8px;
  font-size: 0.8rem;
  border-radius: 3px;
  border: 1px solid var(--ink);
  display: inline-block;
}

.ending-title { font-size: 2.2rem; color: var(--vermilion); margin-bottom: 20px; }
.ending-stat-row { line-height: 1.9; }

#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}

@media (max-width: 600px) {
  .title { font-size: 2rem; }
  h1.title { font-size: 2.2rem; }
  h2.title { font-size: 1.8rem; }
  .body-text { font-size: 1.05rem; }
  .btn { font-size: 1rem; padding: 10px 18px; }
  .btn-block { padding: 14px 16px; font-size: 1rem; }
  .container { padding: 14px; }
  .ink-border { border-width: 2px !important; box-shadow: 3px 3px 0 var(--shadow); }
  #toast-layer { right: 10px; top: 70px; max-width: 240px; }
  .ending-title { font-size: 1.7rem; }
}
@media (max-width: 400px) {
  .title { font-size: 1.7rem; }
  h1.title { font-size: 1.9rem; }
}
</style>

      },

        "ending": true,
        "title": "【遗憾收场】扫黑英雄",
        "text": "你留在 A 市公安，成为扫黑支队队长。\n\n接下来的十年，你亲手打掉 17 个黑帮团伙。\n\nA 市的夜晚，终于安全了。\n\n退休那天，老首长打电话来：「小陈，*谢谢你。*」\n\n你笑着说：「老首长，这是*我该做的。*」\n\n你回到老家，开了一家小面馆。\n\n门口挂着一副对联：\n\n「*扫黑除恶英雄汉；*\n　*退役之后煮面人。*」\n\n—— 这一世，扮猪吃老虎没玩够。\n\n—— 但救了一城的人，值了。",
        "rating": "mid"
      }
    },
    "endings": [
      { "title": "【爽文大圆满】狼牙归来", "condition": { "爽点": { "min": 60 } }, "text": "你重穿军装..." },
      { "title": "【遗憾收场】扫黑英雄", "condition": null, "text": "你留在 A 市公安..." }
    ]
  }
}
</script>
<script>
const STORAGE_KEY = 'reborn_game_state_v1';
const STAT_NAMES = ['武力', '智力', '魅力', '心机', '气运', '声望'];
const SKILL_THRESHOLDS = [
  { min: 10, name: '神级演技', desc: '解锁装傻示弱选项' },
  { min: 30, name: '王霸之气', desc: '被挑衅时自动解锁反杀选项' },
  { min: 60, name: '打脸光环', desc: '新角色登场时自动获得初始好感+10' }
];

const initialState = () => ({
  currentScreen: 'menu',
  currentScenario: null,
  currentNode: null,
  stats: { 武力: 0, 智力: 0, 魅力: 0, 心机: 0, 气运: 0, 声望: 0 },
  爽点: 0,
  unlockedSkills: [],
  history: [],
  completedScenarios: [],
  totalStats: { 玩过剧本: 0, 总爽点: 0 }
});

let state = initialState();
let scenarios = {};

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      state = { ...initialState(), ...loaded };
      if (!state.totalStats) state.totalStats = { 玩过剧本: 0, 总爽点: 0 };
      if (!state.completedScenarios) state.completedScenarios = [];
    }
  } catch(e) { console.error('load state error', e); }
}
function initScenarios() {
  try {
    const el = document.getElementById('scenarios-data');
    if (el && el.textContent) {
      scenarios = JSON.parse(el.textContent);
    }
  } catch(e) {
    console.error('Failed to load scenarios:', e);
    scenarios = {};
  }
}

function clampStat(v) { return Math.max(0, Math.min(100, v)); }

function applyEffects(effects) {
  if (!effects) return;
  Object.entries(effects).forEach(([k, v]) => {
    if (k === '爽点') {
      state.爽点 += v;
      state.totalStats.总爽点 = (state.totalStats.总爽点 || 0) + Math.max(0, v);
    } else if (STAT_NAMES.includes(k)) {
      state.stats[k] = clampStat((state.stats[k] || 0) + v);
    }
  });
  checkSkillUnlocks();
}

function checkSkillUnlocks() {
  SKILL_THRESHOLDS.forEach(s => {
    if (state.爽点 >= s.min && !state.unlockedSkills.includes(s.name)) {
      state.unlockedSkills.push(s.name);
      showSkillToast(s);
    }
  });
}

function checkEndingCondition(cond) {
  if (!cond) return true;
  if (cond.爽点 !== undefined) {
    if (cond.爽点.min !== undefined && state.爽点 < cond.爽点.min) return false;
    if (cond.爽点.max !== undefined && state.爽点 > cond.爽点.max) return false;
  }
  if (cond.stats) {
    for (const [k, v] of Object.entries(cond.stats)) {
      if (v.min !== undefined && (state.stats[k] || 0) < v.min) return false;
      if (v.max !== undefined && (state.stats[k] || 0) > v.max) return false;
    }
  }
  if (cond.flags) {
    for (const f of cond.flags) {
      if (!state.history.includes(f)) return false;
    }
  }
  return true;
}

const app = document.getElementById('app');
function render() {
  app.className = 'paper-bg';
  app.innerHTML = '';
  switch(state.currentScreen) {
    case 'menu': renderMenu(); break;
    case 'selectScenario': renderSelectScenario(); break;
    case 'confirmStats': renderConfirmStats(); break;
    case 'bindSystem': renderBindSystem(); break;
    case 'play': renderPlay(); break;
    case 'ending': renderEnding(); break;
    default: renderMenu();
  }
  saveState();
  window.scrollTo(0, 0);
}

function renderMenu() {
  const wrap = document.createElement('div');
  wrap.className = 'center-screen container fade-in';
  wrap.innerHTML = `
    <div class="ink-border" style="padding: 40px 30px; text-align: center; max-width: 600px; width: 100%;">
      <div style="font-size: 4rem; margin-bottom: 10px;">📜</div>
      <h1 class="title" style="font-size: 2.8rem; margin-bottom: 16px; letter-spacing: 4px;">重生之我在xxx</h1>
      <h2 class="title" style="font-size: 2.2rem; color: var(--vermilion); margin-bottom: 20px;">当xxx</h2>
      <p class="subtitle dim" style="margin-bottom: 30px;">— 短篇爽文文字游戏 · 第一人称沉浸 —</p>
      <div class="ink-border-thin" style="padding: 16px; margin-bottom: 30px; background: rgba(193,39,45,0.05);">
        <p class="body-text" style="font-size: 1rem;">"叮！恭喜宿主绑定【爽文主角系统】"<br>这一次，扮猪吃老虎，由你决定。</p>
      </div>
      <button class="btn" id="btn-start" style="font-size: 1.3rem; padding: 16px 40px;">开始重生 ▶</button>
      ${state.completedScenarios && state.completedScenarios.length > 0 ? `
        <p class="dim" style="margin-top: 24px; font-size: 0.9rem;">
          已通关 ${state.completedScenarios.length} / 6 个剧本 · 累计爽点 ${state.totalStats.总爽点 || 0}
        </p>
      ` : ''}
    </div>
  `;
  app.appendChild(wrap);
  document.getElementById('btn-start').onclick = () => { state.currentScreen = 'selectScenario'; render(); };
}

function getScenarioList() {
  return [
    { id: 'baomu', title: '霸总家当保姆', emoji: '🧹', desc: '从扫地到被霸总夫人刁难，隐藏身份藏不住了' },
    { id: 'taiguan', title: '皇宫当太监', emoji: '👑', desc: '宫墙之内，谁是棋子谁是执棋人？' },
    { id: 'zhuiru', title: '豪门当赘婿', emoji: '💎', desc: '上门女婿？不，是上门收购' },
    { id: 'waimai', title: '末世当外卖员', emoji: '🛵', desc: '丧尸围城？我这单不能迟' },
    { id: 'xianmen', title: '仙门当杂役', emoji: '⚔️', desc: '扫地僧？不，是扫天' },
    { id: 'heibang', title: '黑帮当小弟', emoji: '🔪', desc: '大哥让我去收账，对方是退役兵王' }
  ];
}

function renderSelectScenario() {
  const wrap = document.createElement('div');
  wrap.className = 'container fade-in';
  wrap.innerHTML = `
    <div class="ink-border" style="padding: 30px 24px; margin-top: 30px; margin-bottom: 30px;">
      <h2 class="title" style="margin-bottom: 8px;">选择重生剧本</h2>
      <p class="subtitle dim" style="margin-bottom: 24px;">每段都是独立的爽文短篇</p>
      <div id="scenario-list"></div>
      <div style="margin-top: 24px; text-align: center;">
        <button class="btn" id="btn-back">← 返回主菜单</button>
      </div>
    </div>
  `;
  app.appendChild(wrap);
  const list = document.getElementById('scenario-list');
  const completed = state.completedScenarios || [];
  getScenarioList().forEach(s => {
    if (!scenarios[s.id]) return;
    const card = document.createElement('div');
    const isDone = completed.includes(s.id);
    card.className = 'ink-border-thin scenario-card';
    card.innerHTML = `
      <div style="display: flex; align-items: center; gap: 14px;">
        <div style="font-size: 2.2rem;">${s.emoji}</div>
        <div style="flex: 1;">
          <div class="title" style="font-size: 1.4rem;">重生之我在${s.title} ${isDone ? '<span style="color: var(--gold); font-size: 0.9rem;">✓ 已通关</span>' : ''}</div>
          <div class="dim" style="font-size: 0.95rem; margin-top: 4px;">${s.desc}</div>
        </div>
        <div style="font-size: 1.5rem; color: var(--vermilion);">▶</div>
      </div>
    `;
    card.onclick = () => {
      state.currentScenario = s.id;
      state.currentNode = 'start';
      state.stats = { ...scenarios[s.id].startStats };
      state.爽点 = 0;
      state.unlockedSkills = [];
      state.history = [];
      state.rerolls = 0;
      state.currentScreen = 'confirmStats';
      render();
    };
    list.appendChild(card);
  });
  document.getElementById('btn-back').onclick = () => { state.currentScreen = 'menu'; render(); };
}

function rerollStats() {
  state.rerolls = state.rerolls || 0;
  if (state.rerolls >= 3) return;
  state.rerolls++;
  const base = scenarios[state.currentScenario].startStats;
  const variance = () => Math.floor(Math.random() * 21) - 10;
  state.stats = {};
  STAT_NAMES.forEach(n => {
    state.stats[n] = clampStat(base[n] + variance());
  });
  render();
}

function renderConfirmStats() {
  if (state.rerolls === undefined) state.rerolls = 0;
  const s = scenarios[state.currentScenario];
  const wrap = document.createElement('div');
  wrap.className = 'container fade-in';
  wrap.innerHTML = `
    <div class="ink-border" style="padding: 30px 24px; margin-top: 30px;">
      <h2 class="title" style="margin-bottom: 8px;">${s.title}</h2>
      <p class="subtitle dim" style="margin-bottom: 20px;">${s.intro || ''}</p>
      <div class="ink-border-thin" style="padding: 20px; background: rgba(212,160,23,0.08);">
        <div class="subtitle" style="margin-bottom: 12px; color: var(--ink);">📊 你的初始属性</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          ${STAT_NAMES.map(n => `
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="dim" style="min-width: 50px;">${n}</span>
              <div class="stat-bar-bg" style="margin-left: 0;">
                <div class="stat-bar-fill" style="width: ${state.stats[n]}%; background: ${state.stats[n] >= 60 ? 'var(--vermilion)' : state.stats[n] >= 30 ? 'var(--gold)' : 'var(--indigo)'};"></div>
              </div>
              <span style="margin-left: 8px; font-weight: bold; min-width: 30px; text-align: right;">${state.stats[n]}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div style="margin-top: 20px; text-align: center;">
        <button class="btn" id="btn-reroll" style="margin-right: 10px;" ${(state.rerolls||0)>=3?'disabled':''}>🎲 重新洗点 (${3 - (state.rerolls || 0)}/3)</button>
        <button class="btn" id="btn-confirm" style="background: var(--vermilion); color: var(--paper);">确认开始 ▶</button>
      </div>
      <div style="text-align: center; margin-top: 16px;">
        <button class="btn" id="btn-back" style="font-size: 0.9rem; padding: 8px 16px;">← 换剧本</button>
      </div>
    </div>
  `;
  app.appendChild(wrap);
  document.getElementById('btn-reroll').onclick = rerollStats;
  document.getElementById('btn-confirm').onclick = () => { state.currentScreen = 'bindSystem'; render(); };
  document.getElementById('btn-back').onclick = () => { state.currentScreen = 'selectScenario'; render(); };
}

function renderBindSystem() {
  const wrap = document.createElement('div');
  wrap.className = 'paper-bg center-screen fade-in';
  wrap.style.minHeight = '100vh';
  wrap.innerHTML = `
    <div id="bind-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;">
      <div style="text-align: center; color: var(--paper);">
        <div id="ding" style="font-size: 5rem; color: var(--gold); font-family: 'Ma Shan Zheng', cursive; animation: shake 0.5s ease;">叮！</div>
        <div class="title" style="color: var(--paper); margin-top: 20px; font-size: 2rem;">恭喜宿主</div>
        <div class="title" style="color: var(--gold); margin-top: 10px; font-size: 2.5rem;">绑定【爽文主角系统】</div>
        <div class="dim" style="color: rgba(244,228,193,0.6); margin-top: 20px;">这一世，扮猪吃老虎，由你说了算</div>
      </div>
    </div>
  `;
  app.appendChild(wrap);
  setTimeout(() => { state.currentScreen = 'play'; render(); }, 2800);
}

function renderPlay() {
  const s = scenarios[state.currentScenario];
  if (!s) { state.currentScreen = 'menu'; render(); return; }
  const n = s.nodes[state.currentNode];
  if (!n) { state.currentScreen = 'ending'; render(); return; }
  if (n.ending) { state.currentScreen = 'ending'; render(); return; }
  const wrap = document.createElement('div');
  wrap.className = 'container fade-in';
  wrap.innerHTML = `
    <div id="game-header"></div>
    <div id="game-scene" class="ink-border" style="padding: 28px 24px; margin-top: 16px; min-height: 200px;"></div>
    <div id="game-choices" style="margin-top: 20px;"></div>
    <div id="toast-layer"></div>
    <div id="flying-layer"></div>
  `;
  app.appendChild(wrap);
  renderHeader();
  renderScene(n);
  renderChoices(n.choices || []);
}

function renderHeader() {
  const s = scenarios[state.currentScenario];
  const el = document.getElementById('game-header');
  el.innerHTML = `
    <div class="ink-border-thin" style="padding: 12px 16px; margin-top: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
      <div style="flex: 1; min-width: 0;">
        <div class="title" style="font-size: 1.1rem; color: var(--ink);">${s.title}</div>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="background: var(--vermilion); color: var(--paper); padding: 4px 10px; border-radius: 4px; font-size: 0.95rem;" title="爽点">⚡ ${state.爽点}</div>
        <button id="btn-stats" class="btn" style="font-size: 0.85rem; padding: 4px 10px;">📊</button>
        <button id="btn-menu" class="btn" style="font-size: 0.85rem; padding: 4px 10px;">☰</button>
      </div>
    </div>
    <div id="skill-bar" style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; min-height: 24px;">
      ${state.unlockedSkills.map(sk => `<div class="skill-chip">🏆 ${sk}</div>`).join('')}
    </div>
  `;
  document.getElementById('btn-stats').onclick = showStatsPanel;
  document.getElementById('btn-menu').onclick = showGameMenu;
}

function showStatsPanel() {
  const html = `
    <div class="ink-border" style="padding: 20px; max-width: 400px; width: 90%;">
      <div class="title" style="font-size: 1.4rem; margin-bottom: 16px;">📊 当前属性</div>
      ${STAT_NAMES.map(n => `
        <div style="display: flex; align-items: center; margin-bottom: 10px;">
          <span style="min-width: 50px;">${n}</span>
          <div class="stat-bar-bg" style="height: 14px;">
            <div class="stat-bar-fill" style="width: ${state.stats[n]}%; background: ${state.stats[n] >= 60 ? 'var(--vermilion)' : state.stats[n] >= 30 ? 'var(--gold)' : 'var(--indigo)'};"></div>
          </div>
          <span style="margin-left: 10px; font-weight: bold; min-width: 30px; text-align: right;">${state.stats[n]}</span>
        </div>
      `).join('')}
      <div class="ink-border-thin" style="padding: 12px; margin-top: 16px; background: rgba(212,160,23,0.08);">
        <div class="dim" style="font-size: 0.9rem;">🏆 解锁技能</div>
        <div style="margin-top: 6px; line-height: 1.8;">${state.unlockedSkills.length > 0 ? state.unlockedSkills.map(sk => `<div class="skill-chip" style="margin: 2px 4px 2px 0;">${sk}</div>`).join('') : '<span class="dim">暂无</span>'}</div>
      </div>
      <div style="text-align: center; margin-top: 16px;">
        <button class="btn" id="btn-close-stats">关闭</button>
      </div>
    </div>
  `;
  showModal(html, () => { document.getElementById('btn-close-stats').onclick = closeModal; });
}

function showGameMenu() {
  const html = `
    <div class="ink-border" style="padding: 20px; max-width: 360px; width: 90%;">
      <div class="title" style="font-size: 1.4rem; margin-bottom: 16px;">☰ 游戏菜单</div>
      <button class="btn btn-block" id="btn-restart">🔄 重新开始本剧本</button>
      <button class="btn btn-block" id="btn-main-menu">🏠 返回主菜单（保留进度）</button>
      <button class="btn btn-block" id="btn-new-game">🆕 完全重置（清空所有进度）</button>
      <div style="text-align: center; margin-top: 12px;">
        <button class="btn" id="btn-close-menu" style="font-size: 0.9rem; padding: 6px 14px;">取消</button>
      </div>
    </div>
  `;
  showModal(html, () => {
    document.getElementById('btn-restart').onclick = () => {
      if (!confirm('重新开始当前剧本？')) return;
      state.stats = { ...scenarios[state.currentScenario].startStats };
      state.爽点 = 0; state.unlockedSkills = []; state.history = []; state.currentNode = 'start';
      state.currentScreen = 'play'; closeModal(); render();
    };
    document.getElementById('btn-main-menu').onclick = () => { state.currentScreen = 'menu'; closeModal(); render(); };
    document.getElementById('btn-new-game').onclick = () => {
      if (confirm('确定要清空所有进度吗？此操作不可恢复。')) { localStorage.removeItem(STORAGE_KEY); state = initialState(); state.currentScreen = 'menu'; closeModal(); render(); }
    };
    document.getElementById('btn-close-menu').onclick = closeModal;
  });
}

function showModal(html, onMount) {
  const overlay = document.createElement('div');
  overlay.id = 'modal-overlay';
  overlay.innerHTML = html;
  app.appendChild(overlay);
  if (onMount) onMount();
}
function closeModal() { const m = document.getElementById('modal-overlay'); if (m) m.remove(); }

function renderScene(node) {
  const el = document.getElementById('game-scene');
  let bubbleClass = 'scene-bubble-default';
  let speakerLabel = '';
  if (node.speaker === '系统') {
    bubbleClass = 'scene-bubble-system';
    speakerLabel = '<div class="dim" style="font-size: 0.9rem; margin-bottom: 4px; color: var(--gold);">⚙️ 系统提示</div>';
  } else if (node.speaker === '我') {
    bubbleClass = 'scene-bubble-me';
    speakerLabel = '<div class="dim" style="font-size: 0.9rem; margin-bottom: 4px;">💭 我心想</div>';
  } else if (node.speaker) {
    speakerLabel = `<div class="dim" style="font-size: 0.9rem; margin-bottom: 4px;">🎭 ${node.speaker}</div>`;
  }
  el.innerHTML = `
    ${speakerLabel}
    <div class="${bubbleClass}">
      <div class="body-text">${formatText(node.text)}</div>
    </div>
  `;
  state.history.push(state.currentNode);
}

function formatText(t) {
  if (!t) return '';
  return t.replace(/\*([^*]+)\*/g, '<span class="emphasis">$1</span>')
          .replace(/_([^_]+)_/g, '<span style="text-decoration: underline wavy var(--vermilion);">$1</span>')
          .replace(/「([^」]+)」/g, '「<span style="color: var(--vermilion);">$1</span>」');
}

function renderChoices(choices) {
  const el = document.getElementById('game-choices');
  el.innerHTML = '';
  if (!choices || choices.length === 0) return;
  choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-block fade-in';
    btn.style.animationDelay = (idx * 0.1) + 's';
    const ok = canChoose(c);
    if (!ok.ok) {
      btn.disabled = true;
      btn.innerHTML = `<div>${c.text}</div><div class="dim" style="font-size: 0.85rem; margin-top: 4px;">🔒 ${ok.reason}</div>`;
    } else {
      const tag = c.tag ? `<span class="dim" style="font-size: 0.85rem; margin-left: 6px;">[${c.tag}]</span>` : '';
      btn.innerHTML = `<div>${c.text}${tag}</div>`;
      btn.onclick = (e) => onChoose(c, e.currentTarget);
    }
    el.appendChild(btn);
  });
}

function canChoose(c) {
  if (!c.require) return { ok: true };
  if (c.require.attr) {
    const v = state.stats[c.require.attr] || 0;
    if (v < c.require.min) {
      return { ok: false, reason: `需要 ${c.require.attr} ≥ ${c.require.min}（当前 ${v}）` };
    }
  }
  if (c.require.爽点 !== undefined && state.爽点 < c.require.爽点) {
    return { ok: false, reason: `需要爽点 ≥ ${c.require.爽点}（当前 ${state.爽点}）` };
  }
  if (c.require.skill && !state.unlockedSkills.includes(c.require.skill)) {
    return { ok: false, reason: `需要先解锁技能：${c.require.skill}` };
  }
  return { ok: true };
}

function onChoose(choice, btnEl) {
  const rect = btnEl.getBoundingClientRect();
  applyEffects(choice.effects);
  if (choice.effects && choice.effects.爽点) {
    spawnFlyingText(rect.left + rect.width/2, rect.top, `+${choice.effects.爽点} 爽点`, 'var(--vermilion)');
  }
  ['武力','智力','魅力','心机','气运','声望'].forEach(k => {
    if (choice.effects && choice.effects[k] && choice.effects[k] !== 0) {
      const sign = choice.effects[k] > 0 ? '+' : '';
      const color = choice.effects[k] > 0 ? 'var(--gold)' : 'rgba(26,26,26,0.5)';
      spawnFlyingText(rect.left + rect.width/2, rect.top + 8, `${sign}${choice.effects[k]} ${k}`, color);
    }
  });
  if (choice.next) {
    state.currentNode = choice.next;
    render();
  } else {
    state.currentScreen = 'ending';
    render();
  }
}

function spawnFlyingText(x, y, text, color) {
  const layer = document.getElementById('flying-layer');
  if (!layer) return;
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `position: absolute; left: ${x}px; top: ${y}px; transform: translate(-50%, 0); color: ${color}; font-weight: bold; font-size: 1.1rem; pointer-events: none; text-shadow: 1px 1px 0 var(--paper);`;
  layer.appendChild(el);
  el.animate([
    { transform: 'translate(-50%, 0) scale(1)', opacity: 1 },
    { transform: 'translate(-50%, -80px) scale(1.3)', opacity: 0 }
  ], { duration: 1200, easing: 'ease-out' });
  setTimeout(() => el.remove(), 1300);
}

function showSkillToast(skill) {
  const layer = document.getElementById('toast-layer');
  if (!layer) return;
  const el = document.createElement('div');
  el.className = 'ink-border-thin';
  el.style.cssText = 'background: var(--gold); color: var(--ink); padding: 12px 18px; margin-bottom: 8px; font-size: 1.05rem; font-weight: bold; box-shadow: 4px 4px 0 var(--shadow); animation: fadeIn 0.3s ease;';
  el.innerHTML = `🏆 解锁技能：${skill}<div class="dim" style="font-size: 0.85rem; font-weight: normal; margin-top: 2px;">${skill.desc}</div>`;
  layer.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'all 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(100%)';
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

function renderEnding() {
  const s = scenarios[state.currentScenario];
  if (!s) { state.currentScreen = 'menu'; render(); return; }
  // Prefer the actual node we landed on
  const currentEndingNode = s.nodes[state.currentNode];
  let ending = null;
  if (currentEndingNode && currentEndingNode.ending) {
    ending = {
      title: currentEndingNode.title || '故事结局',
      text: currentEndingNode.text || '',
      rating: currentEndingNode.rating
    };
  } else if (s.endings) {
    for (const e of s.endings) {
      if (checkEndingCondition(e.condition)) { ending = e; break; }
    }
    if (!ending) ending = s.endings[s.endings.length - 1];
  } else {
    ending = { title: '故事继续...', text: '你的冒险暂时告一段落。' };
  }
  if (!state.completedScenarios.includes(state.currentScenario)) {
    state.completedScenarios.push(state.currentScenario);
    state.totalStats.玩过剧本 = (state.totalStats.玩过剧本 || 0) + 1;
  }
  const isPerfect = ending.rating === 'perfect' || state.爽点 >= 60;
  const wrap = document.createElement('div');
  wrap.className = 'container fade-in';
  wrap.innerHTML = `
    <div class="ink-border" style="padding: 36px 28px; margin-top: 40px; text-align: center;">
      <div style="font-size: 4rem; margin-bottom: 10px;">${isPerfect ? '👑' : '📜'}</div>
      <div class="dim" style="margin-bottom: 8px;">— 故事结局 —</div>
      <h2 class="title ending-title">${ending.title}</h2>
      <div class="ink-border-thin" style="padding: 24px 20px; text-align: left; background: rgba(193,39,45,0.04);">
        <div class="body-text">${formatText(ending.text)}</div>
      </div>
      <div class="ink-border-thin" style="padding: 20px; margin-top: 20px; text-align: left;">
        <div class="subtitle" style="margin-bottom: 12px;">📊 本局统计</div>
        <div class="dim ending-stat-row">
          总爽点：<span style="color: var(--vermilion); font-weight: bold; font-size: 1.1rem;">${state.爽点}</span><br>
          解锁技能：${state.unlockedSkills.join('、') || '无'}<br>
          走过节点：${state.history.length}<br>
          评价：<span style="color: ${isPerfect ? 'var(--vermilion)' : 'var(--gold)'}; font-weight: bold;">${isPerfect ? '【爽文大圆满】' : '【尚可】'}</span>
        </div>
      </div>
      <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn" id="btn-replay" style="background: var(--vermilion); color: var(--paper);">🔄 再来一次</button>
        <button class="btn" id="btn-other">📜 选择其他剧本</button>
        <button class="btn" id="btn-home">🏠 返回主菜单</button>
      </div>
    </div>
  `;
  app.appendChild(wrap);
  document.getElementById('btn-replay').onclick = () => { state.currentScreen = 'confirmStats'; state.currentNode = 'start'; render(); };
  document.getElementById('btn-other').onclick = () => { state.currentScreen = 'selectScenario'; render(); };
  document.getElementById('btn-home').onclick = () => { state.currentScreen = 'menu'; render(); };
}

initScenarios();
loadState();
render();
</script>
</body>
</html>
